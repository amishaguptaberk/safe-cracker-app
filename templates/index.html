<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Cracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="card">
    <h1>Safe Cracker</h1>
    <div class="field">
      <label for="combo">10-digit combination</label>
      <input id="combo" type="text" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" placeholder="e.g. 0800666666" autocomplete="off">
    </div>
    <button onclick="startCrack()">Crack It</button>
    <div id="spinner" class="spinner hidden">
      <span class="slot" id="slot-0">0</span>
      <span class="slot" id="slot-1">0</span>
      <span class="slot" id="slot-2">0</span>
      <span class="slot" id="slot-3">0</span>
      <span class="slot" id="slot-4">0</span>
      <span class="slot" id="slot-5">0</span>
      <span class="slot" id="slot-6">0</span>
      <span class="slot" id="slot-7">0</span>
      <span class="slot" id="slot-8">0</span>
      <span class="slot" id="slot-9">0</span>
    </div>
    <div id="result" class="result hidden">
      <div class="stat">
        <span class="label">Attempts</span>
        <span id="attempts" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">Time</span>
        <span id="time" class="value">--</span>
      </div>
      <div id="status-badge" class="badge running">Running...</div>
    </div>
    <div id="cache-label" class="cache-label hidden">cached result</div>
    <div id="error" class="error hidden"></div>
  </div>

  <script>
    let pollInterval = null;
    let spinIntervals = [];
    let cache = {};

    function startSpinner() {
      const digits = "0123456789";
      document.getElementById("spinner").classList.remove("hidden");
      for (let i = 0; i < 10; i++) {
        let counter = 0;
        const slot = document.getElementById("slot-" + i);
        slot.className = "slot";
        spinIntervals[i] = setInterval(() => {
          slot.textContent = digits[counter % 10];
          counter++;
        }, 80);
      }
    }

    function stopSpinner(finalCombo) {
      for (let i = 0; i < 10; i++) {
        clearInterval(spinIntervals[i]);
        const slot = document.getElementById("slot-" + i);
        slot.textContent = finalCombo[i];
        slot.classList.add("locked");
      }
    }

    function startCrack() {
      const combo = document.getElementById("combo").value.trim();
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");
      const btn = document.querySelector("button");

      errorEl.classList.add("hidden");
      resultEl.classList.add("hidden");
      document.getElementById("spinner").classList.add("hidden");
      if (pollInterval) clearInterval(pollInterval);

      btn.disabled = true;

      if (cache[combo]) {
        const cached = cache[combo];
        document.getElementById("attempts").textContent = cached.attempts;
        document.getElementById("time").textContent = cached.time_taken.toFixed(2) + "s";
        document.getElementById("status-badge").textContent = "Cracked!";
        document.getElementById("status-badge").className = "badge done";
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("cache-label").classList.remove("hidden");
        btn.disabled = false;
        return;
      }

      fetch("/api/crack_safe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ actual_combination: combo })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          errorEl.textContent = data.error;
          errorEl.classList.remove("hidden");
          btn.disabled = false;
          return;
        }
        document.getElementById("status-badge").textContent = "Running...";
        document.getElementById("status-badge").className = "badge running";
        resultEl.classList.remove("hidden");
        document.getElementById("cache-label").classList.add("hidden");
        startSpinner();
        poll(data.job_id, btn);
        pollInterval = setInterval(() => poll(data.job_id, btn), 100);
      })
      .catch(() => {
        errorEl.textContent = "Request failed";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
      });
    }

    function poll(jobId, btn) {
      fetch("/api/status/" + jobId)
        .then(r => r.json())
        .then(data => {
          document.getElementById("attempts").textContent = data.attempts;
          if (data.done) {
            clearInterval(pollInterval);
            document.getElementById("time").textContent = data.time_taken.toFixed(2) + "s";
            document.getElementById("status-badge").textContent = "Cracked!";
            document.getElementById("status-badge").className = "badge done";
            const finalCombo = document.getElementById("combo").value.trim();
            cache[finalCombo] = { attempts: data.attempts, time_taken: data.time_taken };
            stopSpinner(finalCombo);
            btn.disabled = false;
          }
        })
        .catch(() => {
          clearInterval(pollInterval);
          document.getElementById("error").textContent = "Lost connection";
          document.getElementById("error").classList.remove("hidden");
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
